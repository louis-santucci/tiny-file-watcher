syntax = "proto3";

option java_multiple_files = true;
option java_package = "io.github.louissantucci.grpc";
option java_outer_classname = "FileWatcherProto";

enum Status {
  SUCCESS = 0;
  ERROR = 1;
}

message FileWatcherMessage {
  int64 id = 1;
  string source = 2;
  string destination = 3;
  bool enabled = 4;
}

message GetAllFileWatchersRequest {
  optional bool active = 1;
}

message GetFileWatcherRequest {
  int64 id = 1;
}

message CreateFileWatcherRequest {
  string source = 1;
  string destination = 2;
}

message DeleteFileWatcherRequest {
  int64 id = 1;
}

message FileWatcherListResponse {
  Status status = 1;
  string error_message = 2;
  repeated FileWatcherMessage file_watchers = 3;
}

message FileWatcherResponse {
  Status status = 1;
  string error_message = 2;
  FileWatcherMessage file_watcher = 3;
}

message DeleteFileWatcherResponse {
  Status status = 1;
  string error_message = 2;
}

service FileWatcherCrud {
  rpc GetAllFileWatchers (GetAllFileWatchersRequest) returns (FileWatcherListResponse) {}
  rpc GetFileWatcher (GetFileWatcherRequest) returns (FileWatcherResponse) {}
  rpc CreateFileWatcher (CreateFileWatcherRequest) returns (FileWatcherResponse) {}
  rpc DeleteFileWatcher (DeleteFileWatcherRequest) returns (DeleteFileWatcherResponse) {}
}

