{{define "base"}}<!doctype html>
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>tiny-file-watcher – Sign in</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css"/>
  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .login-card { max-width: 360px; width: 100%; text-align: center; }
    .login-card h1 { font-size: 1.4rem; margin-bottom: 0.25rem; }
    .login-card p { color: var(--pico-muted-color); margin-bottom: 1.5rem; }
  </style>
</head>
<body>
  <main class="login-card">
    <article>
      <h1>🗂 tiny-file-watcher</h1>
      <p>Sign in to continue</p>
      <a href="/auth/authorize" role="button">Sign in with PocketID</a>
    </article>
  </main>
</body>
</html>{{end}}
